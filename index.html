<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쿠팡 파트너스 자동화 툴</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: #2e2e2e;
    --accent: #ff5c00;
    --accent2: #ff8c42;
    --text: #f0ede8;
    --text2: #888;
    --text3: #555;
    --success: #2ecc71;
    --red: #e74c3c;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .container { max-width: 780px; margin: 0 auto; }

  header {
    margin-bottom: 40px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .logo-dot {
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.85); }
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .subtitle {
    font-size: 13px;
    color: var(--text2);
    margin-top: 4px;
  }

  .step {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }

  .step.active { border-color: var(--accent); }
  .step.done { border-color: #2e2e2e; opacity: 0.9; }

  .step-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .step-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    background: rgba(255,92,0,0.12);
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 500;
  }

  .step-title {
    font-size: 15px;
    font-weight: 500;
  }

  .badge {
    margin-left: auto;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 500;
  }

  .badge.ok { background: rgba(46,204,113,0.15); color: var(--success); }
  .badge.pending { background: rgba(255,92,0,0.1); color: var(--accent); }

  .input-row {
    display: flex;
    gap: 8px;
  }

  input[type="text"], input[type="password"] {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 14px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text3); }

  input[type="password"] { font-family: 'DM Mono', monospace; letter-spacing: 0.05em; }

  .btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    white-space: nowrap;
    transition: background 0.2s, transform 0.1s;
  }

  .btn:hover { background: var(--accent2); }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { background: var(--text3); cursor: not-allowed; }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: border-color 0.2s, background 0.2s;
  }

  .btn-ghost:hover { border-color: var(--text2); background: var(--surface2); }

  .kw-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 8px;
    margin-top: 4px;
  }

  .kw-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .kw-card:hover { border-color: var(--accent); }
  .kw-card.selected { border-color: var(--accent); background: rgba(255,92,0,0.08); }

  .kw-cn {
    font-size: 17px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .kw-ko {
    font-size: 11px;
    color: var(--text2);
  }

  .link-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 4px;
  }

  .link-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    text-decoration: none;
    color: var(--text);
    font-size: 13px;
    transition: border-color 0.2s;
  }

  .link-item:hover { border-color: var(--accent); }

  .platform-tag {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 4px;
    min-width: 52px;
    text-align: center;
  }

  .tag-red { background: rgba(232,77,60,0.2); color: #e84d3c; }
  .tag-tiktok { background: rgba(0,242,234,0.1); color: #00f2ea; }

  .kw-text { flex: 1; color: var(--text2); font-size: 12px; }
  .link-arrow { color: var(--text3); font-size: 12px; margin-left: auto; }

  .video-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }

  .video-list { display: flex; flex-direction: column; gap: 6px; }

  .video-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
  }

  .video-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    min-width: 20px;
  }

  .video-url {
    font-size: 12px;
    color: var(--text2);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .del-btn {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 16px;
    padding: 0;
    line-height: 1;
    transition: color 0.2s;
  }

  .del-btn:hover { color: var(--red); }

  .empty {
    font-size: 13px;
    color: var(--text3);
    text-align: center;
    padding: 20px;
    border: 1px dashed var(--border);
    border-radius: 8px;
  }

  .caption-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-size: 14px;
    line-height: 1.8;
    white-space: pre-wrap;
    color: var(--text);
    margin-top: 4px;
    min-height: 100px;
  }

  .copy-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 8px;
  }

  .loading-text {
    font-size: 13px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dot-anim::after {
    content: '';
    animation: dots 1.2s infinite;
  }

  @keyframes dots {
    0% { content: '.'; }
    33% { content: '..'; }
    66% { content: '...'; }
  }

  .error { font-size: 13px; color: var(--red); margin-top: 6px; }
  .hint { font-size: 12px; color: var(--text3); margin-top: 6px; }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 8px 0 16px;
  }

  footer {
    text-align: center;
    font-size: 12px;
    color: var(--text3);
    margin-top: 40px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<div class="container">

  <header>
    <div class="logo">
      <div class="logo-dot"></div>
      <h1>쿠팡 파트너스 자동화 툴</h1>
    </div>
    <p class="subtitle">상품 키워드 → 중국어 변환 → 레드노트/틱톡 영상 탐색 → 캡션 생성</p>
  </header>



  <!-- STEP 1: 상품 키워드 -->
  <div class="step" id="step1">
    <div class="step-header">
      <span class="step-num">01</span>
      <span class="step-title">상품 키워드 입력</span>
    </div>
    <div class="input-row">
      <input type="text" id="productInput" placeholder="예: 핀란디아 엘라인 스탠딩 6단 북선반" />
      <button class="btn" id="genBtn" onclick="generateKeywords()">키워드 생성 →</button>
    </div>
    <div id="genError" class="error" style="display:none;"></div>
  </div>

  <!-- STEP 2: 중국어 키워드 -->
  <div class="step" id="step2" style="display:none;">
    <div class="step-header">
      <span class="step-num">02</span>
      <span class="step-title">중국어 키워드 5개</span>
      <span class="badge ok">완료</span>
    </div>
    <div class="kw-grid" id="kwGrid"></div>
  </div>

  <!-- STEP 3: 검색 링크 -->
  <div class="step" id="step3" style="display:none;">
    <div class="step-header">
      <span class="step-num">03</span>
      <span class="step-title">레드노트 / 틱톡 검색 링크</span>
    </div>
    <div class="link-list" id="linkList"></div>
  </div>

  <!-- STEP 4: 영상 수집 -->
  <div class="step" id="step4">
    <div class="step-header">
      <span class="step-num">04</span>
      <span class="step-title">영상 링크 수집 <span style="font-size:12px;color:var(--text2);font-weight:400;">최대 10개</span></span>
    </div>
    <div class="video-input-row">
      <input type="text" id="videoInput" placeholder="레드노트 or 틱톡 영상 URL 붙여넣기..." />
      <button class="btn-ghost" onclick="addVideo()">추가</button>
    </div>
    <div class="video-list" id="videoList">
      <div class="empty" id="videoEmpty">영상 링크를 추가해주세요</div>
    </div>
  </div>

  <!-- STEP 5: 캡션 생성 -->
  <div class="step" id="step5">
    <div class="step-header">
      <span class="step-num">05</span>
      <span class="step-title">캡션 초안 생성</span>
    </div>
    <button class="btn" id="captionBtn" onclick="generateCaption()" style="width:100%;">캡션 3개 자동 생성 →</button>
    <div id="captionLoading" style="display:none; margin-top:12px;" class="loading-text">
      <span class="dot-anim">캡션 생성 중</span>
    </div>
    <div id="captionResult" style="display:none; margin-top:12px;">
      <div class="caption-box" id="captionBox"></div>
      <div class="copy-row">
        <button class="btn-ghost" onclick="copyCaption()">복사하기</button>
      </div>
    </div>
    <div id="captionError" class="error" style="display:none;"></div>
  </div>

  <footer>쿠팡 파트너스 자동화 툴 · API 키는 로컬에만 저장됩니다</footer>

</div>

<script>
let keywords = [];
let videos = [];

async function callClaude(prompt) {
  const res = await fetch('/api/claude', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content[0].text;
}

async function generateKeywords() {
  const product = document.getElementById('productInput').value.trim();
  if (!product) return;

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.textContent = '생성 중...';
  document.getElementById('genError').style.display = 'none';
  document.getElementById('step2').style.display = 'none';
  document.getElementById('step3').style.display = 'none';

  try {
    const prompt = `"${product}"을 레드노트(小红书)와 틱톡에서 검색할 중국어 키워드 5개를 알려줘. JSON 배열만 반환해. 설명 없이.
형식: [{"cn":"중국어","ko":"한국어설명"}]`;

    const text = await callClaude(prompt);
    const clean = text.replace(/```json|```/g, '').trim();
    keywords = JSON.parse(clean);

    renderKeywords();
    renderLinks();

    document.getElementById('step2').style.display = 'block';
    document.getElementById('step3').style.display = 'block';
    document.getElementById('step1').classList.add('done');

  } catch(e) {
    document.getElementById('genError').style.display = 'block';
    document.getElementById('genError').textContent = '오류: ' + e.message;
  }

  btn.disabled = false;
  btn.textContent = '키워드 생성 →';
}

function renderKeywords() {
  const grid = document.getElementById('kwGrid');
  grid.innerHTML = '';
  keywords.forEach((k, i) => {
    const card = document.createElement('div');
    card.className = 'kw-card';
    card.innerHTML = `<div class="kw-cn">${k.cn}</div><div class="kw-ko">${k.ko}</div>`;
    grid.appendChild(card);
  });
}

function renderLinks() {
  const list = document.getElementById('linkList');
  list.innerHTML = '';
  const platforms = [
    { name: '레드노트', tag: 'tag-red', base: 'https://www.xiaohongshu.com/search_result/?keyword=' },
    { name: '틱톡', tag: 'tag-tiktok', base: 'https://www.tiktok.com/search?q=' }
  ];

  keywords.forEach(k => {
    platforms.forEach(p => {
      const url = p.base + encodeURIComponent(k.cn);
      const a = document.createElement('a');
      a.className = 'link-item';
      a.href = url;
      a.target = '_blank';
      a.innerHTML = `
        <span class="platform-tag ${p.tag}">${p.name}</span>
        <span class="kw-text">${k.cn} · ${k.ko}</span>
        <span class="link-arrow">열기 →</span>`;
      list.appendChild(a);
    });
  });
}

function addVideo() {
  const input = document.getElementById('videoInput');
  const url = input.value.trim();
  if (!url || videos.length >= 10 || videos.includes(url)) return;
  videos.push(url);
  input.value = '';
  renderVideos();
}

document.getElementById('videoInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addVideo();
});

function removeVideo(i) {
  videos.splice(i, 1);
  renderVideos();
}

function renderVideos() {
  const list = document.getElementById('videoList');
  if (videos.length === 0) {
    list.innerHTML = '<div class="empty" id="videoEmpty">영상 링크를 추가해주세요</div>';
    return;
  }
  list.innerHTML = '';
  videos.forEach((url, i) => {
    const item = document.createElement('div');
    item.className = 'video-item';
    item.innerHTML = `
      <span class="video-num">${String(i+1).padStart(2,'0')}</span>
      <span class="video-url">${url}</span>
      <button class="del-btn" onclick="removeVideo(${i})">×</button>`;
    list.appendChild(item);
  });
}

async function generateCaption() {
  const product = document.getElementById('productInput').value.trim() || '살림 상품';
  const kwText = keywords.length > 0 ? keywords.map(k => k.ko).join(', ') : '';
  const videoText = videos.length > 0
    ? videos.map((u, i) => `${i+1}. ${u}`).join('\n')
    : '(영상 링크 없음)';

  document.getElementById('captionBtn').disabled = true;
  document.getElementById('captionLoading').style.display = 'flex';
  document.getElementById('captionResult').style.display = 'none';
  document.getElementById('captionError').style.display = 'none';

  try {
    const prompt = `쿠팡 파트너스 인스타그램/유튜브 쇼츠용 캡션 3개를 써줘.
상품: ${product}
키워드: ${kwText}
참고 영상:
${videoText}

조건:
- 한국어로
- 각 캡션 50자 내외
- 궁금증 유발하는 후킹 문구
- 마지막에 "링크는 프로필에 🔗" 포함
- 번호 붙여서 구분 (1. 2. 3.)
- 이모지 적절히 사용`;

    const result = await callClaude(prompt);
    document.getElementById('captionBox').textContent = result;
    document.getElementById('captionResult').style.display = 'block';
  } catch(e) {
    document.getElementById('captionError').style.display = 'block';
    document.getElementById('captionError').textContent = '오류: ' + e.message;
  }

  document.getElementById('captionBtn').disabled = false;
  document.getElementById('captionLoading').style.display = 'none';
}

function copyCaption() {
  const text = document.getElementById('captionBox').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    btn.textContent = '복사됨 ✓';
    setTimeout(() => btn.textContent = '복사하기', 2000);
  });
}
</script>

</body>
</html>
